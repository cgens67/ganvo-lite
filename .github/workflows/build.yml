name: Build OpenTune APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.1'

      - name: Build Debug APK
        run: gradle assembleDebug --no-configuration-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTune-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # THIS STEP CATCHES THE ERRORS IF THE BUILD FAILS
      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Errors
          path: '**/build/reports/'
          retention-days: 3
