name: Build Ganvo APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Changed to assembleRelease
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      # Changed the artifact name and file path to grab the release folder
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ganvo-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Errors
          path: '**/build/reports/'
          retention-days: 3
